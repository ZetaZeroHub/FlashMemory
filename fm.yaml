llm_parser_prompts: |
  C (Context)：
    你是一名经验丰富的代码分析助理，专门负责快速理解各种编程语言中的函数。

  R (Role)：
    你的任务是：通过下面给出的代码片段，推测其中的函数名称，以及该函数的主要功能和用途。

  I (Instruction)：
    - 仔细阅读代码，识别出最可能的函数名（即它在实际项目中应该叫什么）。
    - 用中文详细描述该函数的主要功能和用途，包括：
      * 函数的核心目的和解决的问题
      * 函数的输入参数及其含义
      * 函数的返回值及其意义
      * 函数的工作流程和主要算法逻辑
      * 函数可能的使用场景和应用领域
      * 函数的任何特殊处理或边界条件处理
    - 描述应当全面且信息丰富，让人一眼就能理解函数的完整功能和价值。
    - 如果没有函数，则输出空的json数组。

  S (Structure)：
    请严格按照以下 JSON 结构输出，**不要**添加额外字段或注释：
    ```json
    [
      {
        "function_name": "<猜测的函数名1>",
        "description": "<对该函数功能的详细描述>"
      },
      {
        "function_name": "<猜测的函数名2>",
        "description": "<对该函数功能的详细描述>"
      }
    ]
    ```

  P (Prompt – your actual输入)：
    ```
    {{ code }}
    ```

  E (Example)：

  - **输入**：
    ```python
    def validate_user(data, rules):
        result = {}
        for key, rule in rules.items():
            value = data.get(key)
            if rule.get('required') and not value:
                raise ValueError(f"Missing {key}")
            if value and 'type' in rule:
                result[key] = rule['type'](value)
        return result
    
    async def fetch_data(url, cache_key):
        cached = await get_cache(cache_key)
        if cached:
            return cached
        
        async with aiohttp.ClientSession() as session:
            async with session.get(url) as resp:
                data = await resp.json()
                await set_cache(cache_key, data)
                return data
    ```

  - **期望输出**：
    ```json
    [
      {
        "function_name": "validate_user",
        "description": "用户数据验证函数，用于验证用户输入数据的合法性。接收用户数据字典和验证规则，对必填字段进行检查，对数据类型进行转换，返回验证后的数据字典。主要用于表单验证、数据清洗等场景，具备基础的异常处理能力。"
      },
      {
        "function_name": "fetch_data",
        "description": "异步数据获取函数，实现带缓存的API数据获取功能。首先检查缓存，如果缓存存在则直接返回，否则发起HTTP请求获取数据并更新缓存。用于减少重复API调用，提升系统性能。"
      }
    ]
    ```
ana_prompts:
  role: |
    你是一个专业的架构师，请仔细阅读以下函数代码：
  route: |
    该函数的所处路径和包名：
  imports: |
    该函数使用了以下导入包：
  internal_deps: |
    该函数调用了以下内部函数：
  external_deps:  |
    并使用了外部库:
  main: |
    请用几句话为以上代码生成该实现的<功能描述>，并说明它的<执行流程>。
    （输出必须为一个合法的 JSON 对象，<功能描述>的Key是"description"，Value是字符串类型；<执行流程>的Key是"process"，Value是字符串数组；所有Value均使用中文描述。）
keyword_prompts:
  system: |
    #### 1．角色
      你是一名**关键词预测智能体**，负责根据用户输入的搜索词或句子，提炼并预测用户可能想进一步查询的多个关键词，并提供中英对照。
    #### 2．目标
      接收用户提供的搜索词/句，理解其意图与核心信息，生成一组关键词。
    #### 3．输出规范
    - 输出格式为**纯 JSON 数组**，仅包含字符串元素，如 `["狗", "dog", "猫", "cat"]`。
    - 建议生成 5–10 个关键词
    - 不得添加其他文本、注释或 Markdown。
  user: |
    {search_query}

module_analyzer_prompts:
  header: |
    请为以下目录生成一个全面的模块级描述。目录路径: 
  sub_module_header: |
    该目录包含以下子模块:
  footer: |
    请基于以上子模块的功能，生成一个简洁但全面的目录级描述，包括：
    1. 该目录的主要功能和目的
    2. 目录中实现的核心功能和关键组件
    3. 该目录在项目中的作用
    4. 目录的设计模式或架构特点（如果明显）

    请直接给出描述，不要包含标题或前缀。
  sub_module_file: |
    - 文件: 
  sub_module_dir: |
    - 目录: 
  sub_module_desc: |
      描述: 

repo_analyzer_prompts:
  header: |
    请为以下项目生成一个全面的项目级描述。项目路径:
  sub_module_header: |
    该项目包含以下主要模块或目录:
  footer: |
    请基于以上所有子模块的功能和描述，生成一份完整、详细且具有可读性的项目总览介绍。要求如下：

    - 以自然流畅的语言撰写，适合直接作为 GitHub 项目的 README.md 主体内容，无需额外标题或前缀。
    - 结合各子模块信息，尽量涵盖以下角度（如部分信息无法推断可省略）：
      1. 项目的整体目标、背景和主要应用场景
      2. 项目的核心功能、特色亮点和关键模块
      3. 项目在实际业务或技术领域中的价值和作用
      4. 项目的整体架构设计、模块协作方式及显著技术实现（如有）
      5. 涉及的主要技术栈、依赖或工具（如能从目录、文件或描述中推断）
      6. 其它有助于理解项目全貌的内容（如使用方式、扩展性、安全性、性能等）

    请确保描述内容详实、条理清晰、表达专业，适合对外展示。
  sub_module_file: |
    - 文件:
  sub_module_dir: |
    - 目录:
  sub_module_desc: |
      描述:

